minor_changes:
  - proxmox - refactors the proxmox module
  - proxmox - fixes idempotency of template conversions (https://github.com/ansible-collections/community.general/issues/8811).
  - proxmox - fixes issues with disk_volume variable (https://github.com/ansible-collections/community.general/issues/9065).
    - ``disk_volume`` correctly converts to the ``rootfs`` key.
    - the ``storage`` key does not overwrite the ``disk_volume.storage`` key anymore.
    - ``disk_volume.size`` is now correctly used.
  - proxmox - fixes incorrect parsing for bind-only mounts (https://github.com/ansible-collections/community.general/issues/8982).
  - proxmox module utils - fixes ignoring of ``choose_first_if_multiple`` argument in ``get_vmid``.

deprecated_features:
  - proxmox - removes default value of ``update`` parameter. This will be changed to a default of ``true`` in the future.
