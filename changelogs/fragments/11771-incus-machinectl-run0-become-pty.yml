bugfixes:
  - "incus connection plugin - pass ``-t`` to ``incus exec`` when the active become plugin sets ``require_tty`` (for example ``community.general.machinectl`` and ``community.general.run0``), which previously caused systemd-based become methods to fail silently without a controlling tty (https://github.com/ansible-collections/community.general/pull/11771)."
  - "machinectl become plugin - prefix the constructed command with ``SYSTEMD_COLORS=0`` so ``machinectl shell`` stops appending ANSI reset sequences that would otherwise land after the module JSON and break result parsing (https://github.com/ansible-collections/community.general/pull/11771)."
  - "run0 become plugin - prefix the constructed command with ``SYSTEMD_COLORS=0`` so ``run0`` stops emitting terminal control sequences that would otherwise land around the module JSON and break result parsing (https://github.com/ansible-collections/community.general/pull/11771)."
  - "run0 become plugin - mark the plugin as incompatible with connection pipelining, matching ``community.general.machinectl``. The plugin sets ``require_tty``, which is incompatible with pipelining (see https://github.com/ansible/ansible/issues/81254, https://github.com/ansible-collections/community.general/pull/11771)."
