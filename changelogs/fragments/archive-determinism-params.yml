---
minor_changes:
  - archive - add granular determinism parameters (``entry_owner``, ``entry_group``, ``entry_uid``, ``entry_gid``, ``entry_mtime``, ``entry_file_mode``, ``entry_dir_mode``, ``entry_executable_mode``, ``sort_entries``, ``tar_format``, ``gzip_mtime``, ``gzip_filename``, ``gzip_level``) enabling byte-reproducible tar archives across hosts and filesystems without shelling out to GNU tar (https://github.com/ansible-collections/community.general/pull/0).
