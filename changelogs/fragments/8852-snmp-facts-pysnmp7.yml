bugfixes:
  - snmp_facts - the module now also supports ``pysnmp >= 7.1`` and its async API, in addition to the
    existing ``pysnmp < 6.2.4`` support. The appropriate backend is selected automatically at runtime
    (https://github.com/ansible-collections/community.general/issues/8852, https://github.com/ansible-collections/community.general/pull/11680).
