  - id: parse_version_1218
    # "12.18" → (12, 18) > (5, 18) → -B added; monit_version="12.18" in output
    input:
      name: processX
      state: stopped
    output:
      changed: true
      monit_version: "12.18"
      state: stopped
    mocks:
      run_command:
        - *version_1218
