- hosts: "{{ target_hosts | default('you need to specify target_hosts!') }}"
  gather_facts: false
  serial: 1
  tasks:

    ### raw with unicode arg and output

    - name: raw with unicode arg and output
      raw: echo жұүиҜӯ
      register: command
    - name: check output of raw with unicode arg and output
      assert:
        that:
          - "'жұүиҜӯ' in command.stdout"
          - command is changed # as of 2.2, raw should default to changed: true for consistency w/ shell/command/script modules

    ### copy local file with unicode filename and content

    - name: create local file with unicode filename and content
      lineinfile: dest={{ local_tmp }}-жұүиҜӯ/жұүиҜӯ.txt create=true line=жұүиҜӯ
      delegate_to: localhost
    - name: remove remote file with unicode filename and content
      action: "{{ action_prefix }}file path={{ remote_tmp }}-жұүиҜӯ/жұүиҜӯ.txt state=absent"
    - name: create remote directory with unicode name
      action: "{{ action_prefix }}file path={{ remote_tmp }}-жұүиҜӯ state=directory"
    - name: copy local file with unicode filename and content
      action: "{{ action_prefix }}copy src={{ local_tmp }}-жұүиҜӯ/жұүиҜӯ.txt dest={{ remote_tmp }}-жұүиҜӯ/жұүиҜӯ.txt"

    ### fetch remote file with unicode filename and content

    - name: remove local file with unicode filename and content
      file: path={{ local_tmp }}-жұүиҜӯ/жұүиҜӯ.txt state=absent
      delegate_to: localhost
    - name: fetch remote file with unicode filename and content
      fetch: src={{ remote_tmp }}-жұүиҜӯ/жұүиҜӯ.txt dest={{ local_tmp }}-жұүиҜӯ/жұүиҜӯ.txt fail_on_missing=true validate_checksum=true flat=true

    ### remove local and remote temp files

    - name: remove local temp file
      file: path={{ local_tmp }}-жұүиҜӯ state=absent
      delegate_to: localhost
    - name: remove remote temp file
      action: "{{ action_prefix }}file path={{ remote_tmp }}-жұүиҜӯ state=absent"

    ### test wait_for_connection plugin
    - ansible.builtin.wait_for_connection:
