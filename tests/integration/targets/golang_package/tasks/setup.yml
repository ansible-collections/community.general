- block:
    - name: Install golang
      package:
        name: golang
        state: present
    - set_fact:
        has_go: true
  when:
    - ansible_facts.system != 'FreeBSD'
    - ansible_facts.distribution != 'MacOSX'

- block:
    - name: Install go (FreeBSD)
      package:
        name: go
        state: present
    - set_fact:
        has_go: true
  when:
    - ansible_facts.system == 'FreeBSD'
