- name: Put key/values with an etcd prefix
  community.general.etcd3:
    key: "{{ etcd3_prefix }}foo{{ item }}"
    value: "bar{{ item }}"
    state: present
  loop:
    - 1
    - 2
    - 3

- name: Put a single key/value in etcd
  community.general.etcd3:
    key: "{{ etcd3_singlekey }}"
    value: "foobar"
    state: present

- name: Import lookup tests
  ansible.builtin.import_tasks: tests.yml
