- name: list sessions
  consul_session:
    state: list
  register: result

- assert:
    that:
      - result is changed
      - "'sessions' in result"

- name: create a session
  consul_session:
    state: present
    name: testsession
  register: result

- assert:
    that:
      - result is changed
      - result['name'] == 'testsession'
      - "'session_id' in result"

- set_fact:
    session_id: "{{ result['session_id'] }}"

- name: list sessions after creation
  consul_session:
    state: list
  register: result

- set_fact:
    session_count: "{{ result['sessions'] | length }}"

- assert:
    that:
      - result is changed
      - (result['sessions'] | selectattr('ID', 'match', '^' ~ session_id ~ '$') | first)['Name'] == 'testsession'

- name: fetch info about a session
  consul_session:
    state: info
    id: '{{ session_id }}'
  register: result

- assert:
    that:
      - result is changed

- name: ensure 'id' parameter is required when state=info
  consul_session:
    state: info
    name: test
  register: result
  ignore_errors: true

- assert:
    that:
      - result is failed

- name: delete a session
  consul_session:
    state: absent
    id: '{{ session_id }}'
  register: result

- assert:
    that:
      - result is changed

- name: list sessions after deletion
  consul_session:
    state: list
  register: result

- assert:
    that:
      - result is changed
      - (result['sessions'] | selectattr('ID', 'equalto', session_id) | list | length) == 0

- name: ensure session can be created with a ttl
  consul_session:
    state: present
    name: session-with-ttl
    ttl: 180  # sec
  register: result

- assert:
    that:
      - result is changed
      - result['ttl'] == 180
