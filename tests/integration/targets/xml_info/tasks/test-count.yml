- name: Count beer elements
  xml_info:
    path: /tmp/ansible-xml-info-beers.xml
    xpath: /business/beers/beer
    count: true
  register: beers

- name: Test expected result
  assert:
    that:
      - beers is not changed
      - beers.count == 3
